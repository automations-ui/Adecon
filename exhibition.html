<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exhibition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Font Awesome CDN for icons -->
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; overflow: hidden; }

  .container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .click-dot {
    position: absolute;
    width: 16px;
    height: 16px;
    background: red;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
    animation: pulse 1s infinite;
    box-shadow: 0 0 10px rgba(255,0,0,0.7);
  }

  @keyframes pulse {
    0% { transform: scale(1) translate(-50%, -50%); }
    50% { transform: scale(1.5) translate(-50%, -50%); }
    100% { transform: scale(1) translate(-50%, -50%); }
  }

  .map-outline {
    position: absolute;
    border: 2px dashed blue;
    pointer-events: none;
    z-index: 5;
  }

  /* Collapsible Footer Styles */
  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(255,255,255,0.95);
    border-top: 1px solid #ddd;
    z-index: 20;
    transition: transform 0.3s ease-in-out;
  }
  .footer-bar.collapsed {
    transform: translateY(90%);
  }

  .footer-toggle {
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a4d7d;
    color: white;
    padding: 5px 12px;
    border-radius: 12px 12px 0 0;
    cursor: pointer;
    font-weight: bold;
    z-index: 21;
  }

  .component-bar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0;
  }
  .component-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    color: black;
    text-decoration: none;
    width: 200px;
    font-weight: 500;
  }
  .component-item:hover { color: #2a4d7d; }
  .component-item i { font-size: 28px; margin-bottom: 6px; }
  .exhibition { color: black; }
</style>
</head>
<body>

<div class="container">
  <img id="mainImage" src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Stall+View.png" usemap="#image-map" alt="Exhibition View">
  
  <map name="image-map">
    <area href="stall.html" coords="10215,515,16452,6255" shape="rect">
  </map>
</div>

<!-- Collapsible Footer -->
<div class="footer-bar collapsed" id="footerBar">
  <div class="footer-toggle" id="footerToggle">▲</div>
  <div class="component-bar">
    <a href="#" class="component-item" title="Lobby">
      <i class="fa-solid fa-house"></i>
      Lobby
    </a>
    <a href="#" class="component-item" title="Auditorium">
      <i class="fa-solid fa-person-chalkboard"></i>
      Auditorium
    </a>
    <a href="#" class="component-item exhibition" title="Exhibition">
      <i class="fa-solid fa-landmark"></i>
      Exhibition
    </a>
    <a href="#" class="component-item" title="Ask a Question">
      <i class="fa-regular fa-comment"></i>
      Ask a Question
    </a>
    <a href="#" class="component-item" title="Logout">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
      Logout
    </a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
<script>
  // Login check
  if (localStorage.getItem("_loginS") !== "_ltorguien") {
    window.location.href = "login.html";
  }

  // Make the clickable area scale with image
  window.onload = function() {
    imageMapResize();
    addStaticDot();
    setupFooter();
  };

  function addStaticDot() {
    const container = document.querySelector(".container");
    const dotX = 775; // pixels from left of container
    const dotY = 150; // pixels from top of container

    const dot = document.createElement("div");
    dot.className = "click-dot";
    dot.style.left = dotX + "px";
    dot.style.top = dotY + "px";

    container.appendChild(dot);
  }

  // Setup Footer
  function setupFooter() {
    const footer = document.getElementById('footerBar');
    const toggle = document.getElementById('footerToggle');

    toggle.addEventListener('click', () => {
      footer.classList.toggle('collapsed');
      toggle.textContent = footer.classList.contains('collapsed') ? '▲' : '▼';
    });

    const lobbyLink = document.querySelector('.component-item[title="Lobby"]');
    const auditoriumLink = document.querySelector('.component-item[title="Auditorium"]');
    const exhibitionLink = document.querySelector('.component-item[title="Exhibition"]');
    const logoutLink = document.querySelector('.component-item[title="Logout"]');

    lobbyLink.addEventListener('click', () => { window.location.href = 'home.html'; });
    auditoriumLink.addEventListener('click', () => { window.location.href = 'auditorium_recorded.html'; });
    exhibitionLink.addEventListener('click', () => { window.location.href = 'exhibition.html'; });
    logoutLink.addEventListener('click', () => {
      localStorage.removeItem('_loginS');
      window.location.href = 'login.html';
    });
  }
</script>

</body>
</html>
