<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        height: 100vh;
    }

    .hero {
        flex: 2;
        background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
    }

    .login-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f5;
    }

    .login-box {
        background: white;
        padding: 40px;
        width: 300px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #0056b3;
    }

    .register-btn {
        background: #28a745;
    }

    .register-btn:hover {
        background: #1e7e34;
    }

    .error {
        color: red;
        font-size: 14px;
        display: none;
    }
</style>
</head>

<body>

<div class="hero"></div>

<div class="login-container">
    <div class="login-box">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Enter your email" />
        <div class="error" id="errorMsg"></div>
        <button onclick="login()">Login</button>

        <!-- ✅ Register Button -->
        <button class="register-btn" onclick="register()">Register</button>
    </div>
</div>
<script>
// 🔁 Auto-login check on page load
window.onload = function () {
    const loginStatus = localStorage.getItem('_loginS');

    if (loginStatus === '_ltorguien') {
        window.location.href = "home.html";
    }
};
async function login() {
    const email = document.getElementById('email').value.trim();
    const errorMsg = document.getElementById('errorMsg');

    // Basic validation
    if (!email || !email.includes('@')) {
        errorMsg.style.display = 'block';
        errorMsg.innerText = "Please enter a valid email";
        return;
    }

    errorMsg.style.display = 'none';

    try {
        // 🔥 API CALL
        const response = await fetch("https://sapi.onference.in/UsersApi/checkPaymentStatus", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email: email })
        });

        const data = await response.json();

        console.log("API Response:", data);

        // ✅ Allow login only if payment is done
        if (data.paymentStatus && data.paymentStatus !== "payment not done") {
            // Store login flag
            localStorage.setItem('_loginS', '_ltorguien');

            // ✅ Store user's email from response
            if (data.userData && data.userData.length > 0) {
                localStorage.setItem('userEmail', data.userData[0].email);
            }

            window.location.href = "home.html";
        } else {
            // ❌ Redirect if payment not done
            window.location.href = "https://adecon2026-registration.onrender.com/";
        }

    } catch (error) {
        console.error("Error:", error);
        errorMsg.style.display = 'block';
        errorMsg.innerText = "Unable to verify payment. Try again.";
    }
}

// ✅ Register redirect
function register() {
    window.location.href = "https://adecon2026-registration.onrender.com/";
}
</script>

</body>
</html>
