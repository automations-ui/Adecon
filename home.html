<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; }

  .container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .click-dot {
    position: absolute;
    width: 16px;
    height: 16px;
    background: red;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
    animation: pulse 1s infinite;
    box-shadow: 0 0 10px rgba(255,0,0,0.7);
  }

  @keyframes pulse {
    0% { transform: scale(1) translate(-50%, -50%); }
    50% { transform: scale(1.5) translate(-50%, -50%); }
    100% { transform: scale(1) translate(-50%, -50%); }
  }

  .pdf-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .pdf-content {
    width: 80%;
    height: 80%;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }

  .pdf-content iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: red;
    color: #fff;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
  }
</style>
</head>

<body>
<div class="container">
  <img
    id="mainImage"
    src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Lobby+design+with+agenda.png"
    usemap="#image-map"
    alt="Lobby Design with Agenda"
  />

  <map name="image-map">
    <area href="exhibition.html" coords="2000,6599,7037,9495" shape="rect">
    <area href="auditorium_recorded.html" coords="10050,5468,16640,9213" shape="rect">
    <area href="exhibition.html" coords="18923,6481,24643,9472" shape="rect">
    <area href="#" class="agenda-area" data-pdf-url="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/USERGUIDE+ADECON.pdf" coords="7555,11497,9791,13310" shape="rect">
    <area href="#" class="agenda-area" data-pdf-url="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/USERGUIDE+ADECON.pdf" coords="16970,11356,18994,13098" shape="rect">
    <area coords="10238,9660,16264,12604" shape="rect">
  </map>
</div>

<div class="pdf-modal" id="pdfModal">
  <div class="pdf-content">
    <button class="close-btn" onclick="closePDF()">✖</button>
    <iframe id="pdfFrame"></iframe>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>

<script>
  // Check login
  if (localStorage.getItem("_loginS") !== "_ltorguien") {
    window.location.href = "login.html";
  }

  // Open PDF modal
  function openPDF(url) {
    document.getElementById("pdfFrame").src = url;
    document.getElementById("pdfModal").style.display = "flex";
  }

  function closePDF() {
    document.getElementById("pdfModal").style.display = "none";
    document.getElementById("pdfFrame").src = "";
  }

  // Attach PDF click for agenda areas
  function attachAgendaHandlers() {
    document.querySelectorAll("area.agenda-area").forEach(area => {
      area.addEventListener("click", e => {
        e.preventDefault();
        openPDF(area.dataset.pdfUrl);
      });
    });
  }

  window.onload = function() {
    imageMapResize();
    attachAgendaHandlers();
    addStaticDots();
  };

  // Add static red dots at center of each clickable area
  function addStaticDots() {
    const container = document.querySelector(".container");

    // Set static positions manually for visual center
    const dotPositions = [
      { x: 400, y: 335 },   // Exhibition
      { x: 750, y: 350 },   // Auditorium
      { x: 1400, y: 335 },  // Exhibition 2
      { x: 500, y: 680 },   // Agenda Day 1
      { x: 1025, y: 675 },   // Agenda Day 2
      { x: 760, y: 600 }    // Other area
    ];

    dotPositions.forEach(pos => {
      const dot = document.createElement("div");
      dot.className = "click-dot";
      dot.style.left = pos.x + "px";
      dot.style.top = pos.y + "px";
      container.appendChild(dot);
    });
  }
</script>
</body>
</html>
